name: Update Discord Dashboard

on:
  push:
    branches:
      - main

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Discord Notification
        run: |
          TOTAL_COMMITS=$(git rev-list --count HEAD)
          # 커밋 제목만 (첫 줄) — 길이 제한 및 특수문자 안전 처리
          COMMIT_TITLE=$(git log -1 --pretty=%s)

          # jq로 JSON 전체를 빌드 → 특수문자·한국어·개행 모두 안전하게 이스케이프
          JSON_DATA=$(jq -n \
            --argjson color 5814783 \
            --arg count "$TOTAL_COMMITS" \
            --arg msg "$COMMIT_TITLE" \
            --arg ts "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              embeds: [{
                title: "📊 디자인 & 개발 프로젝트 대시보드",
                color: $color,
                fields: [
                  {
                    name: "📈 누적 커밋 횟수",
                    value: ("🟢 현재까지 총 **" + $count + "**번의 변경 사항이 반영되었습니다."),
                    inline: false
                  },
                  {
                    name: "📝 최신 업데이트 내용",
                    value: $msg,
                    inline: false
                  }
                ],
                footer: { text: "실시간 자동 업데이트 중" },
                timestamp: $ts
              }]
            }')

          API_URL="${{ secrets.DISCORD_WEBHOOK_URL }}/messages/${{ secrets.DISCORD_MESSAGE_ID }}"
          curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA" \
            "$API_URL"
