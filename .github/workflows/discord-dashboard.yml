name: Update Discord Dashboard

on:
  push:
    branches:
      - main  # 코드가 push되는 메인 브랜치 이름 (필요시 master 등으로 변경)

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 커밋 기록을 가져옵니다.

      - name: Calculate Total Commits
        id: count_commits
        run: |
          # 현재 브랜치의 총 커밋 개수를 구합니다.
          TOTAL_COMMITS=$(git rev-list --count HEAD)
          echo "TOTAL_COUNT=$TOTAL_COMMITS" >> $GITHUB_ENV
          
          # 최신 커밋의 메시지(AI 댓글 등)를 가져옵니다.
          LATEST_MSG=$(git log -1 --pretty=%B | head -n 3)
          # JSON 깨짐 방지를 위해 이스케이프 처리
          LATEST_MSG=$(echo "$LATEST_MSG" | jq -aR .)
          echo "LATEST_MSG=$LATEST_MSG" >> $GITHUB_ENV

      - name: Update Discord Message
        run: |
          # 디스코드 웹후크 URL 끝에 /messages/메시지ID 를 붙이면 수정(PATCH) 요청이 됩니다.
          API_URL="${{ secrets.DISCORD_WEBHOOK_URL }}/messages/${{ secrets.DISCORD_MESSAGE_ID }}"
          
          # 디스코드로 보낼 예쁜 대시보드 양식 (JSON)
          JSON_DATA=$(cat <<EOF
          {
            "embeds": [
              {
                "title": "📊 디자인 & 개발 프로젝트 대시보드",
                "color": 5814783,
                "fields": [
                  {
                    "name": "📈 누적 커밋 횟수",
                    "value": "🟢 현재까지 총 **${{ env.TOTAL_COUNT }}**번의 변경 사항이 반영되었습니다.",
                    "inline": false
                  },
                  {
                    "name": "📝 최신 업데이트 내용 (AI)",
                    "value": ${{ env.LATEST_MSG }},
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "실시간 자동 업데이트 중"
                },
                "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              }
            ]
          }
          EOF
          )
          
          # Curl을 이용해 기존 디스코드 메시지를 수정합니다.
          curl -X PATCH -H "Content-Type: application/json" -d "$JSON_DATA" "$API_URL"
